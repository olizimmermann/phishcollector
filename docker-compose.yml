services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: phish
      POSTGRES_PASSWORD: phish
      POSTGRES_DB: phishcollector
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U phish -d phishcollector"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      PHISH_DATABASE_URL: postgresql+asyncpg://phish:phish@db:5432/phishcollector
      PHISH_DATA_DIR: /data
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      - ./data:/data
      - ./wordlists:/app/wordlists:ro
    shm_size: "2gb"   # Chromium needs shared memory

  frontend:
    image: nginx:alpine
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "3000:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./frontend/nginx.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  pgdata:
