server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # ── Security headers ────────────────────────────────────────────────────
    add_header X-Content-Type-Options   "nosniff"                          always;
    add_header X-Frame-Options          "DENY"                             always;
    add_header Referrer-Policy          "no-referrer"                      always;
    # CSP: block external resources; allow inline onclick handlers (needed by the SPA)
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; connect-src 'self'; font-src 'self'; object-src 'none'; frame-ancestors 'none';" always;
    # Prevent the browser from sending the captured phishing site's cookies back
    add_header Permissions-Policy "interest-cohort=()" always;

    # Silence favicon requests — no file exists and we don't want loop errors
    location = /favicon.ico {
        return 204;
        access_log off;
        log_not_found off;
    }

    # Proxy all API calls to the FastAPI backend
    location /api/ {
        proxy_pass http://app:8000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_read_timeout  120s;
        proxy_send_timeout  120s;
        # Allow large screenshot / HTML artifact responses
        proxy_buffer_size        256k;
        proxy_buffers            4 512k;
        proxy_busy_buffers_size  512k;
    }

    # SPA catch-all — named location prevents internal redirect cycle
    location / {
        try_files $uri $uri/ @spa;
    }

    location @spa {
        root /usr/share/nginx/html;
        try_files /index.html =404;
    }
}
